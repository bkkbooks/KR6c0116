body:
  text: 唐義淨三藏法師題取經詩晉宋齊梁唐代間高僧求法離長安去人成百歸無十後者安知前者難路遠碧天惟冷結沙河遮日力疲殫後賢如未諳斯旨往往將經容易看唐太宗題焚經臺詩門徑瀟灑長緣苔一回登此一徘徊青牛謾說亟關去白馬親從印土來確定是非憑烈焰要分真僞築高臺春風也鮮嫌狼籍吹盡當年道教灰銷釋金剛科儀蓋聞漢朝感夢白馬西來摩騰彰漢化之初時羅什感秦宗之代典明明佛日照破昏衢朗朗慧燈至今不滅教之興也其在斯焉未法之代至於今日恭白十方賢聖現坐道場本師釋迦牟尼佛文殊普賢二大菩薩滿空聖衆一切神祇有天眼者天眼遙觀有天耳者天耳遙聞他心宿住聖心玄鑑慈愍故慈愍故大慈愍故信禮常住三寶法歸命十方一切佛法輪常轉度衆生僧夫金剛般若能開解脫之門玉偈波羅善入菩提之路行行而非空非有句句而無去無來金剛經說三十二分分分而功德難量須菩提聞四句妙偈偈偈而殊因莫測書寫讀誦當生華藏之天為人演說定達涅槃之路般若乃菩提佛母信心即功德道源長養聖胎出生妙法大抵看經通義問道窮源啓淨信心其擇眼法分句讀貫通之理明問酬辨論之文心心無間理全彰念念不忘文自現或問酬深妙而句義玄微詳究元因略陳數段庶一問一答其文明若日星重辨重徵其義曉如白黑義隨文而文隨義左右逢源珠走盤而盤走珠縱橫無礙信解受持者洞明真性見聞隨喜者咸悟菩提流通天上人間普遍微塵剎海太虗無際法施何窮以斯般若功勛總報四恩三有咦將此身心奉塵剎是則名為報佛恩金剛寶卷才展開龍天八部降臨來薦資亡者超升去現存人眷又消炎謂其有說皆名謗今日分疏謗更多外護不忘親付囑三千里外定聲訛戒香定香解脫明香解脫知見香一辨信香爇在爐上香烟起處遍滿十方請諸佛菩薩赴壇中受供養拈起金剛正令一句殞超千聖揭開般若法門智慧不離自性觀夫空如來藏碎祖師開獨露真常無非般若三心不動六喻全彰七寶校功四句倍勝若乃循行數墨轉益見知宗眼不明非為究竟嗚呼微宣奧旨石火電光密顯真機銀山鐵壁瞥生異見滯在中途進步無門退身迷路聊通一線俯為初機良馬見鞭追風千里矣彌陀如來九品導師切以幻身不久浮世非堅不久則形軀變異非堅則火宅無安由是輪回六趣幾時休遷轉四生何日盡若不念佛求出離畢竟無由得解脫豈不忙然省悟火急修持盡報無期誓生安養高超三界證真空回出四流無苦趣斯辰緣由香煙起處云云釋迦如來證明功德詳夫百年光景全在剎那四大幻身豈能長久每日塵勞汩汩終朝業識茫茫不知一性之圓明徒逞六根之貪欲功名蓋世無非大夢一場富貴驚人難免無常二字爭人爭我到底成空誇會誇能畢竟非實風火散時無老少溪山磨盡幾英雄緣鬢未幾而白髮早侵賀者才臨而弔者隨至一色濃血長年苦戀恩情七尺髑髏恣意慳貪財寶出息難期入息今朝不保來朝愛河出沒幾時休火宅憂煎何日了不願出離業網祇言未有工夫閻羅王忽地來追崔相公豈容展限回首家親都不見到頭業報自家當鬼王獄卒一任期凌劒樹刀山更無推抵或攝沃焦石下或在鐵圍山間受鑊湯則萬死千生遭銼磕則一刀兩段饑吞熱鐵渴飲鎔銅十二時甘受苦辛五百劫不見頭影受足罪業復入輪回頓失舊時人身換却這回皮袋披毛戴角御鐵負鞍以肉供人用命還債生被刀砧之苦死遭湯火之災互積冤愆遞相食噉那時追悔學道無因何如直下承當莫待今生蹉過釋迦文佛捨皇宮而直往雪山居士龐公將家財而悉沉滄海真武不統王位惟務修行呂公既作神仙尚勤參請蘇學士常親佛印韓文公禮終大顛斐公奪笏於石霜房相問法於國一妙善不招駙馬成佛無疑六祖相遇客人聽經頓悟禪道若無況味聖賢何肯歸依華林感二虎隨身投子有三鴉報曉李長者解經而天厨送供須菩提打坐高帝釋散華達摩執履西歸普化搖鈴騰去羅漢來參於仰山和尚嶽帝受戒於思大禪師徑山至今猶是龍王打供雪峯往昔能使木人開山此皆己驗之因由切莫自生於退屈野狐尚聽百丈法螺螄猶護金剛經十千游魚聞佛號化為天子五百蝙蝠聽法音總作聖賢𧎔聞懺以生天龍聽法而悟道彼物尚能領悟況人何不回心或有埋頭喫飯而空過一生或有錯路修行而不省這意豈識菩提覺性箇箇圓成爭知般若善根人人是足莫問大隱小隱休別在家出家不拘僧俗而只要辨心本無男女而何須著相未明人妄分三教了得底同悟一心若能返照回光皆得見性成佛又況人身易失佛法難逢欲超六道之周流惟有一乘之徑捷須求正見莫信邪師悟了方是入頭行得始能脫俗步步踏著實地頭頭頂掛虗空用時則萬境全彰放下則一塵不立超生死不相關之地了鬼神覷不破之機是凡是聖而同箇路頭或冤或親而共一鼻孔如斯實悟尚滯半途休說向上三玄要了末後一著問且道即今喚那箇做末後一著答青山低處見天濶紅藕開時聞水香棄却瓢囊擊碎琴如今不戀汞中金自從一見黃龍從始覺從前錯用心始知生死事無常莫道先從老者亡大限到來無定準後生年少也提防富貴貧窮各有由宿緣分定莫剛求不曾下得春時種空守荒田望有秋修唎修唎摩訶修唎普供養我牟尼梵王帝釋監壇土地金剛菩薩擁護壇儀云何梵畢發願謹受持一相元無垢體性離塵緣專心持四句且要誦真言淨口業真言修唎修唎摩訶修唎修修唎薩婆訶淨三業真言唵娑嚩婆嚩秫䭾娑嚩達摩娑嚩娑嚩秫度憾安土地真言南無三滿多母䭾南唵度嚕度嚕地尾薩婆訶普供養真言唵誐誐曩三婆嚩襪日囉斛蓋聞法身無相非相可觀至理絶言非言所及蓋以因興四願果滿三身酬願現身彰言化物我釋迦聖主利物情深愍娑婆流浪之卿讚嚴土常樂之界國名極樂佛號彌陀四十八願弘深百萬行門廣大雙明真化應接高低地前地上皆生是聖是凡俱往彌陀緣願於是彰為淨土真詮由斯顯矣問經來自久少缺宣傳奉報佛恩當明經旨答透關妙達如來境及第高登本分鄉佛在靈山莫遠求靈山只在汝心頭人人有箇靈山塔好去靈山塔下修外道天摩皆拱手梵王常釋為呈祥願令合會諸男女同證金剛大道場早起忙忙直到昏不愁生死只愁貧饒君使盡千條計直至無常不稱心般若大教六百餘卷佛如來金口宣真詮無為福勝果報利人天稽首三界主大孝釋迦尊纍劫報親恩積因成正覺奉請八金剛四菩薩奉請青除災金剛奉請辟毒金剛奉請黃隨求金剛奉請白淨水金剛奉請赤聲火金剛奉請定持災金剛奉請紫賢金剛奉請大神金剛奉請金剛眷菩薩奉請餘剛索菩薩奉請金剛愛菩薩奉請金剛語菩薩此經乃大乘菩薩摩訶薩人之所修般若為六波羅蜜之最勝者也所以名為般若波羅蜜故下經云如來為發大乘者說為發最上乘者說以此佛說大般若經有六百卷凡一十六會此經乃第五百七十七卷給孤獨園第二處第九會說也問所以道答昔日如來金口演至今拈起又重新此經佛說數千年無量人天得受傳憶得古人曾解道更須會取未聞前人問陽壽真難得一寸光陰一寸金莫待老來方學道孤墳盡是少年人在家菩薩智非常閙市叢中作道場心地若能無礙高山平地總西方金剛般若體如如翠竹黃華滿路途八百餘家呈妙手大家依樣畫葫蘆金剛般若人人本具割斷智為初白雲散處一輪顯露影落千江無來無去諸人薦取凡聖一同居摩訶大法王無短亦無長本來非皂白隨處現青黃發願文稽首三界尊歸命十方佛我今發弘願持此金剛經上報四重恩下濟三途苦若有見聞者悉發菩提心盡此一報身同生極樂國云何梵云何得長壽金剛不壞身復以何因緣得大堅固力云何於此經究竟到彼岸願佛開微密廣為衆生說開經偈無上甚深微妙法百千萬劫難遭遇今我見聞得受持願解如來真實意金剛般若波羅蜜經宗鏡云只這一卷經六道含靈一切性中皆悉具足蓋為受身之後妄為六根六塵埋沒此一段靈光終日冥冥不知不覺故我佛生慈悲心願救一切衆生齊超苦海共證菩提所以在舍衛國為說是經大意只是為人解粘去縛直下明了自性免逐輪回不為六根六塵所惑若人具上根上智不撥自轉是胸中自有此經且將置三十二分於空間無用之地亦不是過如或未然且聽山野與汝打葛藤去也夫金剛經者自性堅固萬劫不壞況金性堅剛也般若者智慧也波羅蜜者登彼岸義也見性得度即登彼岸未得度者即是此岸經者徑也我佛若不開箇徑路後代兒孫又向甚麼處進步問且道這一步又如何進答看取下文提綱此經深旨無相為宗顯妄明真提綱要旨劒鋒微露掃萬法之本空心華發明照五蘊之非有直得雲收雨霽海湛空澄快登般若慈舟直到菩提彼岸問且道心華發明在甚麼處答太湖三萬六千頃月在波心說向誰法王權實令雙行電捲風馳海嶽傾霹𮦷一聲雲散盡到家元不涉途程西方淨土人人有不假修持已現前諸上善人如見性阿彌陀佛便同肩無始無明幻色迷夢魂生死幾千回一條直路超三界但念彌陀歸去來法會因由教起根源如是法我佛在舍衛國中乞食為先次第乞已本處安禪結跏趺坐終日默無言金剛般若智箇箇體如然白雲消散盡明月一輪圓如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘衆千二百五十人俱爾時世尊食時著衣持鉢入舍衛大城乞食於其城中次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐白調御師親臨舍衛威動乾坤阿羅漢雲集祇園輝騰日月入城持鉢良由悲愍貧窮洗足收衣正是晏安時節若向世尊未舉已前薦得猶且不堪開口已後承當自救不了宗鏡急為提撕早遲八刻問何故答良馬已隨鞭影去阿難依舊世尊前乞食歸來會給孤收衣敷座正安居真慈洪範超三界調御人天得自如西方寶號能宣演九品蓮臺必往生直下相逢休外覔何勞十萬八千程百歲光陰瞬息回其身畢竟化為灰誰人肯向生前悟悟取無生歸去來善現啓請頓起疑心合掌問世尊云何應住降伏其心佛教如是子細分明永消此岸無華休怨春金剛般若智莫向外邊求空生來問我教起有因由善現起請分第二時長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩汝今諦聽當為汝說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心唯然世尊願樂欲聞白昔奇哉之善現讚希有之慈尊悲憫濁世衆生咨決菩提心要可謂一經正眼三藏絶詮千聖不傳諸祖不說如是降伏偏舟已過洞庭湖護念叮嚀何啻白雲千萬里問為甚麼如此咦答毗婆尸佛早留心直至而今不得妙問處孤高答處深妙圓真淨不須尋瞥然如是知端的默契菩提大道心阿彌陀佛元無相遍界明明不覆藏文路尚然修淨土東坡猶願往西方才出胞胎又入胎聖人觀此慟悲哀幻身究竟無香潔打破畫瓶歸去來大乘正宗指示叮嚀空生意分明如是應住降伏其心四生六道無我無人誰歸滅度拈來却在心獨坐寂寥寥平地起波濤風來波浪起水漲見船高大乘正宗分第三佛告須菩提諸菩薩摩訶薩應如是降服其心所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想非無想我皆令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩白涅槃清淨盡令含識歸依四相俱忘實無衆生滅度如斯了悟便能脫死超生其或未然依舊迷封滯殼問會麼答生死涅槃本平等妄心盡處即菩提頂門具眼辨來端衆類何曾入涅槃絶後再蘇無一物了知生死不相干七重寶樹人人有九品蓮華處處開不涉一程親見佛圓音時聽悟心懷擲却閻浮似草鞋更無一物可開懷靈明一點輝千古超日月歸光去來妙行無住日月分明本體離根塵四維上下朗耀無窮世尊指教一一分明空生信受驚來處處春摩訶般若宗性相體皆同四生并六道盡在默然中妙行無住分第四復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施須菩提菩薩應如是布施不住於相何以故若菩薩不住相布施其福德不可思量須菩提於意云何東方虗空可思量不不也世尊須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量須菩提菩薩但應如所教住白住相布施猶日月之有窮不著六塵若虗空之無際自他俱利福德難量豁然運用靈通廓爾縱橫自在問且道還有住著處麼答妙體本來無處所通身何更有縱由運心檀度契真常福等虗空不可量無影樹頭華爛熳從他採獻法中王步步頭頭皆是道彌陀元不住西方法身遍滿三千界化佛權為十二光道過邙山古墓排准陰功業事堪哀貧富貴賤皆如夢夢覺來時歸去來如理實見分明說破空生意如何地水火風四大和合雲來雲去本更無他漚生漚滅元非一與多如如真妙理湛湛自然觀圓明真實見隨處得安然如理實見分第五須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來何以故如來所說身相即非身相佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來白金身顯煥巍巍海上孤峯妙相莊嚴皎皎星中圓月然雖如是畢竟非真經云真非真恐迷我常不開演問且道意在於何處答一月普現一切水一切水月一月攝報化非真了妄緣法身清淨廣無邊千江有水千江月萬里無雲萬里天人命無常呼吸間眼觀紅日落西山寶山歷盡空回首一失人身萬劫難稽首彌陀真聖主身乘七寶紫金臺四十八願常無間攝受衆生歸去來正信希有一念無差心外休取法心若取法凡聖皆差心若無念却被雲霞圓明一點春來樹樹華邪心俱蕩盡正信勿生疑念念無差別處處發真機正信希有分第六須菩提白佛言世尊頗有衆生得聞如是言說章句生實信不佛告須菩提莫作是說如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者須菩提如來悉知悉見是諸衆生得如是無量福德何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相何以故是諸衆生若心取相即為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相即著我人衆生壽者是故不應取法不應取非法以是義故如來常說汝等比丘知我說法如筏喻者法尚應捨何況非法白因勝果勝信心明了無疑人空法空真性本來平等直饒名相雙泯取舍兩忘問要且猶存筏見咦答彈指已超生死海何須更覔度人舟善根成熟信無疑取相求玄轉背馳一念頓超空劫外元來不許老胡知頻伽尚能知歸向孔猶聞得化生時節因緣休蹉過樓頭畫鼓恰初更勢至觀音悲滿懷寶瓶楊柳灑三灾誓隨淨土彌陀主接引衆生歸去來無得無說誰為安名空生意分明如來所說無始無終雲生晚谷月照長空千法萬法皆從一法生取捨皆難得無心體自然本來常寂寂無說亦無傳無得無說分第七須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶須菩提言如我解佛所說義無有定法名阿耨多羅三藐三菩提亦無有定法如來可說何以故如來所說法皆不可取不可說非法非非法所以者何一切聖賢皆以無為法而有差別白得亦非說亦非能仁機輪電掣取不可捨不可空生舌本爛翻問且道無為法為甚麼有差別答萬古碧潭空界月再三撈漉始應知雲捲秋空月印潭寒光無際與誰談豁開透地通天眼大道分明不用參西方勝境無明暗不比人間半夜深五鼓分明當子位一輪正滿對天心休插龍叉與鳳叉莫將胸粉污唇腮法身清淨元無垢體露堂堂歸去來依法出生法法皆真元從一法生四生六道情與無情山河大地體露分明泥牛哮吼黃河徹底清山河如掌平無樂亦無成千差與萬別金剛界內生依法出生分第八須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來說福德多若復有人於此經中受持乃至四句偈等為他人說其福勝彼何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出須菩提所謂佛法者即非佛法白寶萬三千財施有盡偈宣四句法施無窮發生智慧光明流出真如妙道所以稱揚德勝了達性空徹諸佛之本源豁一經之眼目問還見四句親切處麼答真性洞明依般若不勞彈指證菩提徒將七寶施三千四句親聞了上根無量劫來諸佛祖從茲超出涅槃門慧燈不滅魔難入智鏡常明夢不侵堪嘆浮生瞌睡漢從它萬劫恣昏沈頭髮焦然乾竹叉兩肩擔水又擔柴一生貧賤多辛苦厭惡女身歸去來一相無相本自如然不在口宣傳五五果四向誰後誰先絲毫不掛萬法周圓圓明彌滿無心照大千五果并四向本體元無相兩目不相似鼻孔都一樣一相無相分第九須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無不來是故名阿那含須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢世尊我不作是念我是離欲阿羅漢世尊我若作是念我得阿羅漢道世尊則不說須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行白人天往返諸漏未除道果雙忘無諍第一超凡入聖從頭勘證將來轉位回機透底盡令撤去問還委悉麼答勿謂無心云是道無心猶隔一重關果位聲聞獨善身寂然常定本非真回心頓入如來海倒駕慈航逆渡人樓頭畫鼓五更闌爭奈衆生被眼瞞不見性天光燦燦但於夜後黑漫漫極樂國中真快樂永無八難及三灾常聞天樂空中響敢勸衆生歸去來莊嚴淨土錦上添華徒勞任算沙然燈昔日授記無差因風吹火末後拈華誰人會得迦葉便笑他莊嚴生淨土金粟眼中沙初生全泄漏末後又拈華莊嚴淨土分第十佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛說非身是名大身白如來續焰然燈實無可得之法菩薩莊嚴佛土應無所住之心諸妄消亡一真清淨昔究法華妙旨親感普賢誨言清淨身心安居求實冥符奧義豁悟前因直得心法兩忘眼塵俱泯問且道莊嚴箇什麼咄答彈指圓成八萬門剎那滅却三祇劫正法眼中無所得涅槃心外謾莊嚴六塵空寂無人會推倒須彌浸玉蟾百歲光陰一剎那凌晨淨口念彌陀看經讀誦無休歇必免當來過奈河造論弘經大辨才馬鳴龍樹及天台圭峯乃法至清涼老總勸西方歸去來無為福勝四句堪誇如塵比數沙住相布施凡聖皆差無來無去月照簾下無根樹子常開四季花四句絶堪誇河沙數漸多算來無一法淨處娑婆訶無為福勝分第十一須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福德多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德白滿積恆沙七寶周回布施三千福德分明因果不昧能宣四句之偈勝前萬倍之功用真智以照愚如急流而勇退問且道退後如何答象踏恆沙徹底過大千沙界百雜碎重增七寶滿恆沙如棄甜瓜覔苦瓜溪悟真空元不壞百千三昧總虗華有歲光陰撚指間奔馳不定片時間煩君檢點形骸看多少英雄去不還勢至悲光絶點埃塵塵剎剎現如來真心量與觀音等接引衆生歸去來尊重正教誰敢輕慢塔廟在身邊人人本有箇箇皆然金剛寶藏體自周圓若還信受怗來自檢看起坐皆尊重常親塔廟前如如元不動處處得安然尊重正教分第十二復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處即為有佛若尊重弟子白慈愍三根隨說乃人天敬仰受持四句皆應如塔廟尊崇常行無念之心實為希有之法問如何是最上第一句答非但我今獨達了恆沙諸佛體皆同說處隨宜不滯空勸持四句為流通天龍覆護尊如塔功德無邊讚無窮百歲光陰老盡人青山緑水至如今開眸認取來生路莫學愚頑錯用心念佛臨終見寶臺寶幡寶蓋滿空排彌陀勢至觀音等合掌相隨歸去來如法受持誰敢謾他須菩提於意如何我今為汝一一言破白雲散處月照禪河文殊不遠休巡山禮土坡如法謹受持福勝等須彌白雲消散盡明月始光輝如法受持分第十三爾時須菩提白佛言世尊當何名此何經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛說般若波羅蜜即非般若波羅蜜是名般若波羅蜜須菩提於意云何如來有所說法不須菩提白佛言世尊如來無所說須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來說三十二相即是非相是名三十二相須菩提若有善男子善女人以恆河沙等身命布施若復有人於此經中乃至受持四句偈等為他人說其福甚多白大覺尊本來不立一字而直指人心須菩提無端特請標名而強生枝節縱使析微塵如世界無相可求施身命等河沙無法可說問且道奉持箇什麼答金剛寶劒倚天寒外道邪魔俱腦裂箇裏本無元字腳空中誰敢強安名等間點出金剛眼照破魔王八萬城百歲光陰不自驚老來何物作前程只憑經卷三千歲莫把虗華過一生般若現前無礙橫身宇宙莫疑猜虗空拶破難藏覆大道分明歸去來離相寂滅誰為分別有口也難說五百世中割截夫節而無一念妄生虗說成道證果雲散家家月離相即非說古今常寂滅而無一念心任汝分支節離相寂滅分第十四爾時須菩提聞說是經深解義趣涕淚悲泣而白佛言希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨即生實相當知是人成就第一希有功德世尊是實相者即是非相是故如來說名實相世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有衆生得聞是經信解受持是人即為第一希有何以故此人無我相無人相無衆生相無壽者相所以者何我相即是非相人相衆生相壽者相即是非相何以故離一切諸相即名諸佛佛告須菩提如是如是若復有人得聞是經不驚不怖不畏當知是人甚為希有何以故須菩提如來說第一波羅蜜即非第一波羅蜜是名第一波羅蜜須菩提忍辱波羅蜜如來說非忍辱波羅蜜是名忍辱波羅蜜何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無衆生相無壽者相何以故我於往昔節節支解時若有我相人相衆生相壽者相應生瞋恨須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無衆生相無壽者相是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心若心有住即為非住是故佛說菩薩心不應住色布施須菩提菩薩為利益一切衆生故應如是布施如來說一切諸相即是非相又說一切衆生即非衆生須菩提如來是真語者實語者如語者不誑語者不異語者須菩提如來所得法此法無實無虗須菩提若菩薩心住於法而行布施如人入暗即無所見若菩薩心不住法而行布施如人有目日光明照見種種色須菩提當來之世若有善男子善女人能於此經受持讀誦即為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德白空生聞說是經解義趣而悲流兩淚仙人垂慈弘忍笑雪刃而謾斬虗空如是印可其詞能離一切諸相問未審感悟處有何奇特咦答豁開慧眼明如日返照微塵世界空善吉親聞徹見源悲欣交集讚慈尊心空法朗超真際堪報從前不報恩百歲光陰石火光回頭何不早思量無常相請宜推托免向閻君論短長真樂真常真淨土寶池實樹寶華開無寒無暑無凋變歸去來分歸去來持經功德福多難比三時喻不齊住相布施終須有退無漏智慧頓證菩提華開華謝日東月落西此經功德勝誰人解受持寒山逢捨得拍手笑微微持經功德分第十五須菩提若有善男子善女人初日分以恆河沙等身布施中日分復以恆海沙等身布施後日分亦以恆海沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說須菩提以要言之是經有不可思議不可稱量無邊功德如來為發大乘者說為發最上乘者說若有人能受持讀誦廣為人說如來悉知是人悉見世人皆得成就不可量不可稱無有邊不可思議功德如是人等即為荷擔如來阿耨多羅三藐三菩提何以故須菩提若樂小法者著我見人見衆生見壽者見則於此經不能聽受讀誦為人解說須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處即為是塔皆應恭敬作禮圍繞以諸華香而散其處白布施千萬億劫之身福深如海為發最上乘者說擔重如山慶快撩起便行且請依前放下問何故答大力量人元不動等間抹過上頭關倒握吹毛掃異蹤頓令心地盡開通鋒𨦵獨露毗盧頂凡聖齊教列下風百歲光陰燭在風誰人心與佛心同修行速往西方去足下蓮華步步生十念圓成一念回三心果滿九蓮開塵勞念佛同時去歸去來兮歸去來能淨業障塵體雙亡五百億難量恆沙諸佛承重供養而今成道萬法齊彰圓明果滿春來日漸長業障本來無心差轉見殊若悟三空理何處不如如能淨業障分第十六復次須菩提若善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅當得阿耨多羅三藐三菩提須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一千萬億分乃至算數譬喻所不能及須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心即狂亂狐疑不信須菩提當知是經義不可思議果報亦不可思議白宿業緣而墮惡道今人賤而罪即消供諸佛誦此經功德勝而喻莫及問只如無著無相底還有果報也無答妄心滅盡業還空直證菩提超等級惡因誰作罪誰招真性如空不動搖曠劫無明俱蕩盡先天後地寂寥寥百歲光陰似水流無窮無盡幾時休不如先證菩提路悉免輪回得自由歸去來兮歸去來一靈休更入脆胎化身華上身金色目擊金容歸去來究竟無我四大全空五蘊假立名通達萬法處處皆空青山緑水雲起長空諸人薦黃鸝啼曉風授記本無言真慈大覺宣四相非四相菩提果自鮮究竟無我分第十七爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛即不與我授記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗是故如來說一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法須菩提譬如人身長大須菩提言世尊如來說人身長大即為非大身是名大身須菩提菩薩亦如是若作是言我當滅度無量衆生即不名菩薩何以故須菩提實無有法名為菩薩是故佛說一切法無我無人無衆生無壽者須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來說莊嚴佛土者即非莊嚴是名莊嚴須菩提若菩薩通達無我法者如來說名真是菩薩白妄盡還真衆生何曾滅度法空無我菩提本自圓成直饒遇然燈印證而不疑已隔來世況釋迦重審而方悟轉涉途程問且道不涉途程底人腳跟還點地麼答丈夫自有衛天志不向如來行處行直指單傳密意深本來非佛亦非心分明不受然燈記自有靈光耀古今百歲光陰一夢中老來不與舊時同衆生好似風無定搖落桃華滿地紅不知誰解巧安排揑聚依前又放開莫謂如來成斷滅一聲還續一聲來一體同觀萬法無差凡聖共一家如來五眼照耀塵沙三心洞徹本性無涯春來日暖無樹不放花如來具六通三心不可窮算沙無億數到此體皆同一體同觀分第十八如須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼須菩提於意云何如恆河中所有沙佛說是沙不如是世尊如來說是沙須菩提於意云何如一恆河中所有沙有如是沙等恆河是諸恆河所有沙數佛世界如是寧為多不甚多世尊佛告須菩提爾所國土中所有衆生若干種心如來悉知何以故如來說諸心皆為非心是名為心所以者何須菩提過去心不可得現在心不可得未來心不可得白五眼悉圓明如揭日曜恆沙之世界三心不可得似發火覔滄海之浮漚縱使窮諸玄辨竭世樞機到此總須茫然問問且道是何標格答直饒講得千經論也落禪家第二籌心眼俱通法界周恆沙妙用沒蹤由雲收江湛天空濶明月蘆華一樣秋荒郊日落草風悲試問骷髏儞是誰或是英雄豪傑漢回頭能有幾人知未法娑婆入苦灾互相食噉惡如豺刀兵疫病遭饑饉厭離閻浮歸去來法界通化似有還無箇箇本無殊圓明一點無來無去搬柴運水好用工夫松梢月朗衣穿露寶珠珍寶滿盈剎福德等難量若到無福地方知滋味長法界通化第十九須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不說得福德多以福德無故如來說得福德多白布施因緣實人天有漏之果無為福德超凡聖通化之功噫有為雖僞棄之則功行不成無為雖真擬之則聖果難證問且道不擬不棄時如何是聖諦第一義答達摩當機會直指廓然元不識梁王寶施寰中福倍常華開錦上最難量就中拶倒空王殿露柱燈籠書放光郊園又是一番春骷髏縱橫白似銀日炙風吹休懊惱骷髏總是利名人淨土永無三惡道寶方寂靜不輪回金繩界到經行處好念彌陀歸去來離色離相無住無依法界普光輝無言無說無是無非無來無去無相無為澄潭月朗石人帶帽歸知得如來意玄空不復尋具足非具足聲色兩分明離色離相分第二十須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來說具足色身即非具足色身是名具足色身須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足白有相有身如來莊嚴具足分賓分主空生解辨親疏直得賓主兩忘色相俱離問如何是主中主答若臣道合無回互認得分明不是渠端嚴相好紫金身正眼看來總不真要會問酬親的意蘊空無我亦無人圓音唱處響清淨試誦金剛一卷經薦取衆生方外句稱鎚是鐵太分明陌上桃華春又開風吹殘杏雪飛垓紛紛落處誰人悟笑指靈雲歸去來非說所說不在分別本性離言說潺潺緑水出廣長舌圓音落落無間無歇休將耳聽紅爐飛片雪我心本非有無心說向誰所說非所說為被上乘機非說所說分第二十一須菩提汝勿謂如來作是念我當有所說法莫作是念何以故若人言如來有所說法即為謗佛不能解我所說故須菩提說法者無法可說是名說法爾時慧命須菩提白佛言世尊頗有衆生於未來世間說是法生信心不佛言須菩提彼非衆生非不衆生何以故須菩提衆生衆生者如來說非衆生是名衆生白如來無所說慈雲甘露灑濛濛慧命未嘗聞明月清風空寂寂問正恁麼時且道是何境界答欲得不招無間業莫謗如來正法輪道本無言喚不醒藥因救病出金瓶可憐萬億人天衆依舊呆呆側耳聽鼓聲集衆下林泉莫學金剛問普賢高坐猊臺傳祕要妙通一指老僧禪有病有危終退墮不生不滅不輪回西方淨土常安樂無苦無憂歸去來無法可得情識難量本體露堂堂包含法相界與無相行住坐臥子細參詳知音勘破炎天降雪霜無為所得法得法何所持無有少法故三藐三菩提無法可得分第二十二須菩提白佛言世尊佛得阿耨多羅三藐三菩提焉無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提白法無可得是名阿耨菩提道無可傳直指涅槃正眼問只如得而無得傳而不傳畢竟是何宗旨答三賢尚未明斯旨十聖那能達此宗從來無說亦無傳才涉思惟便福關語默離微俱掃盡寥寥獨坐古靈山爐中裊裊試拈香普請天龍降道場功德無邊應有報莊嚴淨土事難量六欲諸天具五衰三禪尚自有風灾直饒修到非非想也則不如歸去來淨心行善休教點污此法離凡愚是法平等萬法皆如青山緑水與我何殊金生麗水蟾光滿太虗淨心平等行無下亦無高善法非善法何須口叨叨淨心行善分第二十三復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無衆生無壽者修一切善法即得阿耨多羅三藐三菩提須菩提所言善法者如來說即非善法是名善法白法無高下故諸佛心內衆生時時成道相離我人故諸衆心生內諸佛念念證真所以道念佛不礙參禪參禪不礙念佛至於念而無念參而不參洞明本地風光了達惟心淨土溪山雖異雲月皆同問那裏不是平等之法要知縱橫不礙處麼答處處緑楊堪繫馬家家有路透長安山華似錦水如藍莫問前三與後三心境廓然忘彼此大千沙界總包含口裏叨叨念彌陀心頭人我似干戈其心若不從頭改磕破髑髏當得麼世人愚上無智慧惟知愛欲及貪財何如一筆都勾斷好念彌陀歸去來福智無比二法周圓塵沙結良緣功行纍劫果滿功緣智燈普照一月當天圓明朗朗無心鑒大千般若真空性福慧兩雙修四句無為法持念片時周福智無比分第二十四須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一百千萬億分乃至算數譬喻所不能及白福等三千施須彌之七寶經持四句耀智海之明珠能令識浪澄清頓使義天開朗弘慈普濟廣利無邊問夜半正明還在何處答三身四智體中圓八解六通心地印寶聚山王算莫窮還如仰箭射虗空洞明四句超三際絶勝僧祇萬倍功一毛頭上為拈華笑倒傍邊老作家要問相逢端的意摩尼達哩吽癹吒我憶彌陀如父母彌陀觀我似嬰孩心心念念常無間父子相隨歸去來化無所化機分大小空生莫疑猜四生六道去住還來回光返照面目明白疑心頓歇紅霞遍九垓大乘深奧理解悟有多般實我實我無子細好生觀化無所化分第二十五須菩提於意云何汝等勿謂如來作是念我當度衆生須菩提莫作是念何以故實無有衆生如來度者若有衆生如來度者如來即有我人衆生壽者須菩提如來說有我者即非有我而凡夫之人以為有我須菩提凡夫者如來說即非凡夫是名凡夫白無我無人衆生自成正覺不生不滅如來說非凡夫雖然箇事分明爭奈當機蹉過昔有僧問翠巖云還丹一粒點鐵成金至理一言轉凡成聖問學人上來請師一點答師云不點問僧云為什麼不點答師云恐汝落凡聖問且道不落凡聖底人具什麼眼答直饒聖解凡情盡開服依前在夢中到岸從來不用船坦然大道透長安了知元不因他悟面目分明總一般前三三與後三三擬議商量總不堪饒汝識情俱絶斷三生九劫更重參白髮雙親齒漸衰勤供甘旨莫遲回試學昔日能仁氏奉事尊堂歸去來法身非相不在心懷絶中間與內外聲色見我未出輪胎若離聲色難見如來徒勞遠覔文殊在五臺有相即無相無相亦無真兩處俱不立一體始方親法身非相分第二十六須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王即是如來須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來爾時世尊而說偈言若以色見我以音聲求我是人行邪道不能見如來白妙相莊嚴聖王相即如來相法身周遍如來身異聖王身若向這裏見得徹去鷺倚雪巢兔棲月殿問其或未然答石火一揮天外去癡人猶看月邊星公案現成重審問愛情翻疑錯承當不應聲色行邪道結罪無因見法王九年面壁自知非不若抽身隻履歸莫道少林消息斷白雪依舊擁柴扆三界忙忙何日省六塵擾擾幾時休西方一路超生死齊念彌陀到地頭無斷無滅自古長存不滅更不生山河成壞這箇安寧無來無去耀古騰今人人本具鍮石不換金不生亦不滅無斷亦無常常樂併我淨非不好商量無斷無滅分第二十七須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者說諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不說斷滅相白相非具而本具常自莊嚴法雖傳而不傳何曾斷滅昔世尊於靈山會上人天衆前云吾有清淨法眼涅槃妙心付囑飯光廣令傳化問且道當時傳箇甚麼答青蓮目顧人天衆金色頭陀獨破顏一燈能續百千燈心印光通法令行千聖不傳吹不滅聯輝列焰轉分明一點靈光塞太虗也非禪教也非儒打成一片誰人會具眼還他大丈夫天樂簫韶華雨飛他方遊歷聖初回如雲海衆相迎接目擊金容歸去來不受不貪知足常足無罪亦無福隨緣過日且忌分訴千家一鉢衲子活路雖無一物與衆生贈福不覺塵緣起貪愛轉見深若得回光照當生即不生不受不貪分第二十八須菩提若菩薩以滿恆河沙等世界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故說不受福德白有求有苦八風五欲交煎無著無貪三明六通自在問便恁麼去答水邊林下月冷風清問不恁麼去答橋斷路截別通消息問還委悉麼答老僧笑指猿啼處更有靈蹤在上方數行梵字雲中雁一曲無生㵎底琴德勝河沙渾不用清風明月是知音春來秋去幾時休堪嘆衆生又白頭東廓郊中多古墓北邙山下有骷髏白傳文章世間稀尚求兜率厭輪回我今奉勸文章士念佛西方歸去來威儀寂靜塔大心路不用巧分訴行住坐臥無盡無餘無所從來亦無所主若人會得全不費工夫人人具四大我見萬法空行住并坐臥來去與真同威儀寂靜分第二十九須菩提若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來白坐臥經行本自無來無去威儀不動寂然非靜非搖問要解如來所說義否答隨緣赴感靡不周而常處此菩提座巍巍不動法中王那有獼猴跳六笑指真空無面目連雲推月下千江蘆華影裏一骷髏半臥黃沙半土丘骷髏但有心頭氣爭名奪利幾時休漢末殘唐甚苦哉人心上下極相乖貪婪虗僞那堪說亂世如麻歸去來一合相理下住分別處處任宣說九年面壁斬釘截鐵神光三拜華開時節分明點破稱鎚原是鐵三千界微塵俱來一念心如來一合相推倒大虗空一合相理分第三十須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵衆寧為多不須菩提言甚多世尊何以故若是微塵衆實有者佛即不說是微塵衆所以者何佛說微塵衆即非微塵衆是名微塵衆世尊如來所說三千大千世界即非世界是名世界何以故若世界實有者即是一合相如來說一合相即非一合相是名一合相須菩提一合相者即是不可說但凡夫之人貪著其事白以世界碎如微塵慈尊喻巧於玄要立權名談其實相凡夫意絶於貪求問與麼會得答返本還源背塵合覺問不與麼會答智同諸佛悲合衆生問總不與麼答巨靈擡手無多子分破華山千萬重一段生涯六不收從前萬法盡非儔輕輕擘破三千界直待恆河水逆流九曲黃河直指君分明全不涉途程不知白日青天裏開眼許多迷路人東晉遠公曾結社遺民房翥總奇才淵明入會多耽飲今晚休杯歸去來知見不生返照還源本性離言詮見聞覺知無正無偏無垢無淨無缺無圓靈光皎皎杲日正當天知見度衆生衆生亦復盲如來非法相方到涅槃城知見不生分第三十一須菩提若人言佛說我見人見衆生見壽者見須菩提於意云何是人解我所說義不不也世尊是人不解如來所說義何以故世尊說我見人見衆生見壽者見即非我見人見衆生見壽者見是名我見人見衆生見壽者見須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來說即非法相是名法相白若著見聞覺知不解如來妙義悟無我人壽命還同陽𦦨空華楞嚴云知見立知即無明本知見無見斯即涅槃問只如法相不生時還信解麼答大千沙界海中漚一切聖賢如電拂法空非我道非親樹倒藤枯笑轉新風掃止啼黃葉盡千林全體露天真朝日忙忙暮日忙衆生何不早思量人如春夢終須短命若風燈豈久長淨土緣生稱本懷一靈更不墮脆胎法身解脫俱齊等瞥地回頭歸去來應化非真如露如電有為法不牢堅住相布施果報人天持經四句入聖超凡頻頻轉念金剛體最堅演說四句偈六度已為初縱橫無礙般若自如如應化非真分第三十二須菩提若有人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩提心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼云何為人演說不取於相如如不動何以故一切有為法如夢幻泡影如露亦如電應作如是觀白施七寶滿僧祇福有求而即妄持此經演四句雖德勝而非真宴坐水月道場成就空華佛事度幻化之含識證寂滅之菩提凡情聖解俱空生死涅槃如夢昔梁武帝請傅大士講經大士揮案一聲便乃下座如斯洪範千古分明不吝弘慈當機辨著噫大士揮尺請經猶是曲埀方便美則甚美了則未了若論最上頓宗直是不通凡聖以金剛王寶劒盡情掃蕩無餘一任渠明來暗來四方八面來普教他休去歇去一念萬年去問雖然如是旦道末後一句誰堪奉行咄答直得虗空悉消殞天龍八部遍流通空生疊疊窮迷妄大覺重重說偈言末後了然超百億明如杲日曜乾坤直截根源說與君了無些子涉情塵奈何蹉過西來意猶道休將景示人極樂家鄉甚妙哉無諸憂苦樂常諧因談果海圓音徹時禮金容歸去來金剛般若六度根源內外最牢堅三千大千萬古流傳雙林默語祖祖重宣開示悟入衆生大有緣說破無生話決定住西方彌陀極樂國常聞般若香佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行金剛般若波羅蜜經白觀之為言內心覺照其在般若心經則首云觀自在菩薩行深般若波羅蜜多時照見五蘊皆空在此經則終以如是觀如發菩提心者印證諸法空義學者勿以肉眼觀之而會之則為親參黃面矣凡諸聞者莫不頓然開悟無量歡喜信而受之奉而行之問且道信受奉行箇甚麼答觸目對陽真般若山河全露法王身五千來字妙難量八百餘家解漫說珍重諸人休外覔回光直下自承當鬼神稽首聽經聲妙悟圓通萬法明從此諸人如會得這回更不問前程人身得處最為難莫把浮生過等間直須籍金剛三昧力直教打破死生關三十二分分分全真言下好惺惺四流浪息六國安寧朝看暮轉屑抽釘春雷震響推倒望舟亭龍樓鳳閣地鹿苑法王經二本皆相似合掌志心聽補闕真言南謨喝囉怛那哆囉夜耶佉囉佉囉俱住俱住摩囉摩囉虎囉吽賀賀蘇怛拏吽潑沫拏娑婆阿白今同善衆共閲最上乘經慶幸今宵朝佛事時當滿散普集良因莊嚴會首之福田成就無窮之善果問此事且止試問諸人這一場會業作麼施行還會得麼答拈起則佛覷不破展開則法界難藏若能直下承當管取本來具足雖然如是猶涉途程問且道如何即今兩手分付又作麼生道咦答言言見諦言非有句句超宗句本無金剛本體湛然虗把斷牢關一物無若要山僧通線路諸人收取護身符閻王本是平等君不愛民財只取人陰司若用錢打當貧者先亡富者存西方極樂景幽深寶綱光騰百萬尋菩薩為鄰談妙旨聲聞作伴演圓音良緣衆等略聽些箇般若大摩訶行住坐臥不離這箇人人本具非我非他諸人薦取今生莫蹉過摩訶空最大最大是摩訶般若波羅蜜撒手見彌陀摩訶般若波羅蜜多心經觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄舍利子色不異空空不異色色即是空空即是色受想行識亦復如是舍利子是諸取法空相不生不滅不垢不淨不增不減是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法無眼界乃至無意識界無無明亦無無明盡乃至無老死亦無老死盡無苦集滅道無智亦無得以無所得故菩提薩埵依般若波羅蜜多故心無𦊱礙無𦊱礙故無有恐布遠離顛倒夢想究竟涅槃三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提故知般若波羅蜜多是大神呪是大明呪是無人上呪是無等等呪能除一切苦真實不虗故說般若波羅蜜多呪即說呪曰揭諦揭諦波羅揭諦波羅僧揭諦菩提薩婆阿白夫欲了最上大乘須具金剛正眼看釋迦老與須菩提顯大機施大用聚須彌山王等七寶碎大千沙界若微塵盡僧祇劫布施將來獨最上乘無法可得直得人天膽喪魔外心寒俱能捨命承當依舊白雲萬里所以解此經者八百餘家頌此經者不滿屈指蓋古人錯答一字尚墮野孤謬誦此經應入地獄宗鏡自惟不入地獄何由極濟羣生既能為法忘軀豈避迷天逆罪撗按寶釰重說偈言摧涅槃心滅正法眼掃除知見截斷命根堪報不報之恩用酬難酬之德四十九年成露布五千餘卷盡言詮妙明一句威音外折角泥牛雪裏眠阿彌陀佛色光輝白毫宛轉五須彌頂上旋螺青絲髮三十二種相巍巍銷唱金經滿散緣四施今辰福無邊合會衆等齊修證見聞薰種已周圓道場圓滿不可思議人人用心機銷唱金經佛聖遍知上祝皇帝聖壽萬歲法界有情同生極樂國南無一乘宗無量義真空妙有金剛般若經至此隨意回向伏願經聲琅琅上徹穹蒼梵語玲玲下通幽府一願刀山落刀二願劒樹摧鋒三願爐炭收𦦨四願河江浪息針咽餓鬼永絶饑虗鱗角羽毛莫相食噉惡暈變怪掃出天門異獸靈魑潛藏地穴囚徒禁繫願降天恩疾病纏身早逢良藥盲者聾者願見願聞跛者啞者能行能語懷孕婦人願子母團圓征客遠行早還家國貧窮下賤惡業衆生誤殺故傷一切冤尤並皆消釋金剛威力洗滌身心般若威光照臨寶座舉足下足皆是佛地更願七祖先亡離苦生天地獄罪苦悉皆解脫以及此不盡功德上報四思下資三有法界有情齊登正覺川老頌云如飢得食渴得漿病得瘥熱得凉貪人得寶嬰兒見娘飄舟到岸孤客遠鄉早逢甘澤國有忠良四夷拱手八表來降頭頭總是物物全彰古今凡聖地獄天堂東西南北不用思量利塵沙界諸群品盡入金剛大道場三塗永息常時苦六趣休隨汩沒因恆沙含識悟真如一切有情登彼岸乃至虗空世界盡衆生及業煩惱盡如是四法廣無邊願今回向亦如是南無安養國極樂界一真實際性識圓明彌陀佛南無安養國極樂界二空雙證法報化身彌陀佛南無安養國極樂界三根祇園演讚真誠彌陀佛南無安養國極樂界四華微妙香潔彩雲彌陀佛南無安養國極樂界五濁惡世離垢超升彌陀佛南無安養國極樂界六聲佛號一念西生彌陀佛南無安養國極樂界七珍林內菩薩來迎彌陀佛南無安養國極樂界八功德水洗蕩根塵彌陀佛南無安養國極樂界九蓮臺畔次第化生彌陀佛南無安養國極樂界十聲佛號頓悟超升彌陀佛宣卷功德已周圓曰向三寶衆龍天見聞盡悟真空理大衆同歸般若船十方三世一切佛文殊普賢觀自在諸尊菩薩摩訶薩摩訶般若波羅蜜唐僧取經往西天一去十萬零八千昔日如來金口演至今拈起又重宣𮘗經已畢禮當懺悔衆等隨意𮘗十懺經文懺悔已畢禮當報佛祖洪恩衆等隨意𮘗十報經文報恩已畢衆等隨意𮘗摩訶般若波羅蜜多心經結結經偈願以此功德普及於一切我等與衆生皆共成佛道道光乙未年孟夏奉佛弟子心僧談建基薰盥敬録
